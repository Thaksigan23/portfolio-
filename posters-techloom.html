<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techloom.ai Posters | Digital Marketing | Sivaruban Thaksigan</title>
    <meta name="description" content="Techloom.ai digital marketing posters.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=premium-v19-hiring">
</head>
<body>
    <div class="bg-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
        <div class="glow-3"></div>
    </div>

    <header class="dm-topbar">
        <div class="container dm-topbar-inner">
            <a href="index.html" class="dm-brand">Sivaruban Thaksigan<span class="brand-dot">.</span></a>
            <div class="dm-topbar-actions">
                <a href="digital-marketing.html" class="dm-back-link"><i class="fas fa-arrow-left" aria-hidden="true"></i> Digital Marketing</a>
                <div class="theme-toggle" id="theme-toggle" title="Toggle Dark/Light Mode">
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </div>
    </header>
    <div class="dm-topbar-space" aria-hidden="true"></div>

    <main class="dm-page poster-collection-page">
        <div class="container">
            <h1 class="sr-only">Techloom.ai posters</h1>
            <div class="poster-page-hero">
                <nav class="dm-breadcrumb" aria-label="Breadcrumb">
                    <a href="index.html">Portfolio</a>
                    <span class="dm-breadcrumb-sep">/</span>
                    <a href="digital-marketing.html">Digital Marketing</a>
                    <span class="dm-breadcrumb-sep">/</span>
                    <span class="dm-breadcrumb-current">Techloom.ai</span>
                </nav>
            </div>

            <!-- Dev: regenerate tiles with node scripts/build-poster-galleries.mjs -->
            <div class="poster-gallery">
                <p class="poster-empty-note">This gallery is empty. Add PNG or JPG images to <code class="poster-code">images/posters/techloom/</code>.</p>
            </div>
        </div>
    </main>

    <div class="poster-lightbox" id="poster-lightbox" aria-hidden="true">
        <button type="button" class="poster-lightbox-close" id="poster-lightbox-close" aria-label="Close poster">
            <i class="fas fa-times" aria-hidden="true"></i>
        </button>
        <figure class="poster-lightbox-figure">
            <img id="poster-lightbox-img" src="" alt="">
            <figcaption id="poster-lightbox-caption" class="poster-lightbox-caption"></figcaption>
        </figure>
    </div>

    <footer class="footer footer-compact">
        <div class="container">
            <p><a href="digital-marketing.html">← Digital Marketing hub</a> · <a href="index.html">Portfolio home</a></p>
        </div>
    </footer>

    <div class="back-to-top" aria-label="Scroll to top">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script src="marketing.js?v=1"></script>
</body>
</html>
